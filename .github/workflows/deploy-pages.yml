name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: excalidraw-pm-demo-main/excalidraw-pm-demo-main
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          HUSKY: "0"

      - name: Build
        run: yarn build:app:docker
        env:
          VITE_APP_DISABLE_SENTRY: "true"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: excalidraw-pm-demo-main/excalidraw-pm-demo-main/excalidraw-app/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
